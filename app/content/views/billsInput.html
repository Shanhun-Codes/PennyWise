<section ng-controller="BillController">
  <form name="billEntry" ng-submit="addBill()" novalidate>
    <div id="billList">
      <input type="text" ng-model="search" placeholder="Search for bill" />
      <ul>
        <li
          ng-repeat="bill in bills | orderBy: '-dollarAmount' | filter: search"
        >
          {{bill.name}} {{bill.dollarAmount | currency}}
          <div class="remove" ng-click="removeBill(bill)">X</div>
          <span>
            {{(bill.dollarAmount / (postTaxIncome/12) * 100 | number:2)}}% of
            income
          </span>
        </li>
      </ul>
    </div>
    <div id="addBillForm">

        <label for="">Add bill:</label>
        <input
        type="text"
        name="name"
        ng-model="newBill.name"
        ng-required="true"
        placeholder="Whats this bill for?"
        />
        <input
        type="number"
        name="dollarAmount"
        ng-model="newBill.dollarAmount"
        ng-required="true"
        placeholder="Dollar amount"
        />
        <button type="submit">Add bill</button>
        <span ng.show=""></span>
        <div>
            <button ng-disabled="billEntry.$invalid" !important ng-click="finished()" style="background-color: lightgreen; margin: 1em;">Finished</button>
        </div>
    </div>
  </form>
</section>
